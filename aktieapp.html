<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Aktieapp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;
  --green:#27500A;--green-l:#EAF3DE;
  --red:#791F1F;--red-l:#FCEBEB;
  --amber:#633806;--amber-l:#FAEEDA;
  --purple:#3C3489;--purple-l:#EEEDFE;
  --pink:#72243E;--pink-l:#FBEAF0;
  --bg:#f5f5f7;--surface:#fff;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--muted:#666;--r:12px;
}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f12;--surface:#1c1c1f;--border:rgba(255,255,255,0.1);--text:#f0f0f0;--muted:#999}}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
a{color:inherit;text-decoration:none}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.statusbar{background:var(--surface);padding:10px 20px 6px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:500;border-bottom:0.5px solid var(--border);flex-shrink:0}
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tabbar{display:flex;background:var(--surface);border-top:0.5px solid var(--border);padding:8px 0 max(16px,env(safe-area-inset-bottom));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;border:none;background:transparent;color:var(--muted);font-size:10px;transition:color .15s}
.tab.active{color:var(--blue)}
.tab svg{width:22px;height:22px}
.sechead{padding:14px 16px 10px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0}
.sechead h2{font-size:19px;font-weight:500}
.sechead p{font-size:11px;color:var(--muted);margin-top:2px}
.filters{display:flex;gap:6px;padding:9px 12px;overflow-x:auto;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tsep{padding:6px 14px;font-size:11px;font-weight:500;color:var(--muted);background:var(--bg);border-bottom:0.5px solid var(--border)}
.card{background:var(--surface);margin:7px 11px;border-radius:var(--r);border:0.5px solid var(--border);padding:13px}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-bottom:7px}
.pill{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:500}
.pill-buy{background:var(--green-l);color:var(--green)}
.pill-sell{background:var(--red-l);color:var(--red)}
.spin-wrap{display:flex;justify-content:center;padding:3rem}
.spin{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{margin:1rem;padding:14px;background:var(--red-l);border-radius:var(--r);font-size:12px;color:var(--red);text-align:center;line-height:1.6}
.errbox button{margin-top:10px;padding:5px 14px;border-radius:20px;border:none;background:var(--red);color:#fff;font-size:12px}
.empty{text-align:center;padding:3rem 2rem;color:var(--muted);font-size:13px}
.bars{height:44px;display:flex;align-items:flex-end;gap:2px;margin:8px 0}
.bar-n{flex:1;border-radius:2px 2px 0 0;background:var(--border);min-height:3px}
.bar-s{flex:1;border-radius:2px 2px 0 0;background:#378ADD;min-height:3px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar"><span id="clock"></span><span>📶 🔋</span></div>

  <div class="page active" id="pg-news">
    <div class="sechead"><h2>Aktienyheter</h2><p>Sök nyheter om börsnoterade företag</p></div>
    <div style="padding:10px 11px 6px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="position:relative">
        <input id="news-q" type="text" placeholder="Sök t.ex. NVDA, Tesla, Ericsson…" autocomplete="off" autocorrect="off" spellcheck="false"
          style="width:100%;padding:10px 44px 10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none"/>
        <button onclick="doNewsSearch()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--blue);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>
    <div style="display:flex;gap:5px;padding:8px 11px;overflow-x:auto;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;scrollbar-width:none">
      <button class="chip on" onclick="newsQS(this,'NVDA')">NVDA</button>
      <button class="chip" onclick="newsQS(this,'AAPL')">AAPL</button>
      <button class="chip" onclick="newsQS(this,'TSLA')">TSLA</button>
      <button class="chip" onclick="newsQS(this,'MSFT')">MSFT</button>
      <button class="chip" onclick="newsQS(this,'META')">META</button>
      <button class="chip" onclick="newsQS(this,'Bitcoin')">Bitcoin</button>
      <button class="chip" onclick="newsQS(this,'Ericsson')">Ericsson</button>
      <button class="chip" onclick="newsQS(this,'Spotify')">Spotify</button>
      <button class="chip" onclick="newsQS(this,'Volvo')">Volvo</button>
    </div>
    <div class="scroll" id="news-scroll"></div>
  </div>

  <div class="page" id="pg-spikes">
    <div class="sechead"><h2>Ovanliga rörelser</h2><p>Dagens gainers &amp; losers · live</p></div>
    <div class="scroll" id="spike-scroll"></div>
  </div>

  <div class="page" id="pg-insider">
    <div class="sechead"><h2>Insider-handel</h2><p>Senaste 30 dagarna · STOCK Act</p></div>
    <div class="filters" id="insider-filters">
      <button class="chip on" data-icat="alla">Alla</button>
      <button class="chip" data-icat="köp">Köp</button>
      <button class="chip" data-icat="sälj">Sälj</button>
      <button class="chip" data-icat="senat">Senaten</button>
      <button class="chip" data-icat="repr">Repr.</button>
    </div>
    <div class="scroll" id="insider-scroll"></div>
  </div>

  <div class="tabbar">
    <button class="tab active" onclick="switchTab('news',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 10h16M4 14h10M4 18h10M14 14h6v4h-6z"/></svg>Nyheter
    </button>
    <button class="tab" onclick="switchTab('spikes',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14z"/><path d="M12 12c0 3-2 4-2 7a2 2 0 0 0 4 0c0-3-2-4-2-7z"/></svg>Kurshopp
    </button>
    <button class="tab" onclick="switchTab('insider',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>Insider
    </button>
  </div>
</div>

<script>
const NEWS_KEY='18c1082220e84274804af844efbfa801';
const POLYGON_KEY='UoIqGBxsYdQyxVEpnAu2gdy53vc_lAkF';
const POS_W=/beat|surge|jump|rise|gain|rally|high|record|buy|upgrade|profit|growth|strong|bull|soar|climb|boost/i;
const NEG_W=/miss|fall|drop|decline|down|low|sell|downgrade|loss|weak|bear|cut|warn|crash|slide|plunge|tumble/i;
function newsSent(t){const p=POS_W.test(t),n=NEG_W.test(t);if(p&&!n)return{l:'Positiv',bg:'var(--green-l)',c:'var(--green)'};if(n&&!p)return{l:'Negativ',bg:'var(--red-l)',c:'var(--red)'};return{l:'Neutral',bg:'var(--bg)',c:'var(--muted)'};}
function newsAgo(d){const h=Math.round((Date.now()-new Date(d))/3600000);if(h<1)return'Precis nu';if(h<24)return h+' tim sedan';return Math.floor(h/24)+' dag sedan';}

function newsQS(btn,sym){
  document.querySelectorAll('#pg-news .chip').forEach(p=>p.classList.remove('on'));
  if(btn)btn.classList.add('on');
  document.getElementById('news-q').value=sym;
  fetchNewsSearch(sym);
}
function doNewsSearch(){const v=document.getElementById('news-q').value.trim();if(v)fetchNewsSearch(v);}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('news-q').addEventListener('keydown',e=>{if(e.key==='Enter')doNewsSearch();});
});

async function fetchNewsSearch(sym){
  const sc=document.getElementById('news-scroll');
  sc.innerHTML=spinner();
  try{
    const gnUrl=`https://news.google.com/rss/search?q=${encodeURIComponent(sym+' stock')}&hl=en-US&gl=US&ceid=US:en`;
    const ctrl=new AbortController();
    setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch(gnUrl,{signal:ctrl.signal});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const txt=await r.text();
    const xml=new DOMParser().parseFromString(txt,'text/xml');
    const nodes=Array.from(xml.querySelectorAll('item'));
    if(!nodes.length){sc.innerHTML='<div class="empty">Inga nyheter hittades för "'+sym+'"</div>';return;}
    const items=nodes.map(n=>({
      title:n.querySelector('title')?.textContent||'',
      link:n.querySelector('link')?.nextSibling?.nodeValue||n.querySelector('link')?.textContent||'#',
      pub:n.querySelector('pubDate')?.textContent||'',
      source:n.querySelector('source')?.textContent||'Google News',
    })).filter(i=>i.title);
    let html=`<div style="display:flex;justify-content:space-between;padding:8px 13px;font-size:11px;color:var(--muted)"><span>Nyheter om <b style="color:var(--text)">${sym}</b></span><span style="color:var(--blue)">${items.length} artiklar</span></div>`;
    items.forEach(i=>{
      const s=newsSent(i.title);
      html+=`<div class="card"><a href="${i.link}" target="_blank" rel="noopener">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px">
          <p style="font-size:13px;font-weight:500;line-height:1.45;color:var(--text);flex:1">${i.title}</p>
          <span style="flex-shrink:0;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:2px;background:${s.bg};color:${s.c}">${s.l}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span style="font-weight:500">${i.source}</span><span>${newsAgo(i.pub)}</span>
        </div>
      </a></div>`;
    });
    sc.innerHTML=html;
  }catch(e){
    sc.innerHTML=errBox('Nätverksfel: '+e.message,`fetchNewsSearch('${sym}')`);
  }
}

// ── KURSHOPP via Polygon.io ───────────────────────────────────────────────────
let spikeData=[];

async function loadSpikes(){
  const sc=document.getElementById('spike-scroll');
  sc.innerHTML=spinner();
  try{
    const [gRes,lRes]=await Promise.all([
      fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/gainers?apiKey=${POLYGON_KEY}`).then(r=>r.json()),
      fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/losers?apiKey=${POLYGON_KEY}`).then(r=>r.json()),
    ]);
    const map=t=>({
      ticker:t.ticker,
      name:t.ticker,
      chg:+(t.todaysChangePerc||0).toFixed(2),
      price:+(t.day?.c||t.lastTrade?.p||0).toFixed(2),
      vol:t.day?.v||0,
      avg:t.prevDay?.v||1,
      dir:(t.todaysChangePerc||0)>=0?'up':'down'
    });
    const gainers=(gRes.tickers||[]).slice(0,10).map(map);
    const losers=(lRes.tickers||[]).slice(0,10).map(map);
    spikeData=[...gainers,...losers].filter(t=>t.ticker&&t.chg!==0);
    if(!spikeData.length) throw new Error('Inga kursrörelser tillgängliga just nu');
    renderSpikes();
  }catch(e){sc.innerHTML=errBox(e.message,'spikeData=[];loadSpikes()');}
}

function fmtVol(v){if(!v)return'–';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return''+v;}

function renderSpikes(){
  const sc=document.getElementById('spike-scroll');
  const up=spikeData.filter(q=>q.dir==='up');
  const dn=spikeData.filter(q=>q.dir==='down');
  let html='';
  [[up,'Dagens uppgångar'],[dn,'Dagens nedgångar']].forEach(([grp,label])=>{
    if(!grp.length)return;
    html+=`<div class="tsep">${label}</div>`;
    grp.forEach(q=>{
      const mult=q.avg?+(q.vol/q.avg).toFixed(1):1;
      const spike=Math.min(95,Math.max(20,Math.round(mult*20)));
      const bars=[22,30,18,25,20,28].map(h=>`<div class="bar-n" style="height:${h}%"></div>`).join('')+`<div class="bar-s" style="height:${spike}%"></div>`;
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
          <div>
            <span style="font-size:17px;font-weight:500">${q.ticker}</span>
            <span class="pill ${q.dir==='up'?'pill-buy':'pill-sell'}">${q.chg>=0?'+':''}${q.chg}%</span>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">$${q.price}</div>
          </div>
          <div style="font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;background:${q.dir==='up'?'var(--green-l)':'var(--red-l)'};color:${q.dir==='up'?'var(--green)':'var(--red)'}">
            ${q.dir==='up'?'↑ Uppgång':'↓ Nedgång'}
          </div>
        </div>
        <div class="bars">${bars}</div>
        <div style="display:flex;gap:10px;font-size:11px;color:var(--muted)">
          <span>Volym <b style="color:var(--text)">${fmtVol(q.vol)}</b></span>
          <span>Snitt <b style="color:var(--text)">${fmtVol(q.avg)}</b></span>
          <span><b style="color:var(--text)">${mult}×</b> normalt</span>
        </div>
      </div>`;
    });
  });
  sc.innerHTML=html||'<div class="empty">Inga rörelser just nu – marknaden kan vara stängd.</div>';
}

// ── INSIDER via house/senate-stock-watcher ────────────────────────────────────
let insiderData=[], insiderFilter='alla';
const AV=[{bg:'#E6F1FB',c:'#0C447C'},{bg:'#EEEDFE',c:'#3C3489'},{bg:'#FBEAF0',c:'#72243E'},{bg:'#E1F5EE',c:'#085041'},{bg:'#FAEEDA',c:'#633806'}];

async function loadInsider(){
  const sc=document.getElementById('insider-scroll');
  if(insiderData.length){renderInsider();return;}
  sc.innerHTML=spinner();
  try{
    const cutoff=new Date(Date.now()-30*24*3600*1000);
    const fetchViaProxy=async url=>{
      // Prova direkt först, annars rss2json som raw-proxy
      try{
        const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
        if(r.ok) return r.json();
      }catch{}
      // Fallback: allorigins
      const r2=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(15000)});
      if(!r2.ok) throw new Error('HTTP '+r2.status);
      return r2.json();
    };
    const [hR,sR]=await Promise.allSettled([
      fetchViaProxy('https://house-stock-watcher-data.s3-us-east-2.amazonaws.com/data/all_transactions.json'),
      fetchViaProxy('https://senate-stock-watcher-data.s3-us-east-2.amazonaws.com/aggregate/all_transactions.json')
    ]);
    const house=hR.status==='fulfilled'?hR.value:[];
    const senate=sR.status==='fulfilled'?sR.value:[];
    if(!house.length&&!senate.length) throw new Error('Kunde inte nå insider-data – kontrollera internetanslutningen');
    const all=[
      ...house.filter(t=>new Date(t.transaction_date||t.disclosure_date)>=cutoff).map(t=>({
        name:t.representative,chamber:'House',party:t.party||'?',
        ticker:t.ticker,type:t.type==='purchase'?'köp':'sälj',
        amount:t.amount,date:(t.transaction_date||'').slice(0,10)
      })),
      ...senate.filter(t=>new Date(t.transaction_date||t.disclosure_date)>=cutoff).map(t=>({
        name:t.senator,chamber:'Senate',party:t.party||'?',
        ticker:t.ticker,type:(t.type||'').toLowerCase().includes('purchase')?'köp':'sälj',
        amount:t.amount,date:(t.transaction_date||'').slice(0,10)
      }))
    ].filter(t=>t.name&&t.ticker&&t.ticker!=='--'&&t.ticker.length<8);
    const byP={};
    all.forEach(t=>{
      if(!byP[t.name])byP[t.name]={name:t.name,chamber:t.chamber,party:t.party,trades:[]};
      byP[t.name].trades.push({ticker:t.ticker,type:t.type,amount:t.amount,date:t.date});
    });
    insiderData=Object.values(byP).filter(p=>p.trades.length).slice(0,40);
    if(!insiderData.length) throw new Error('Inga transaktioner hittades');
    renderInsider();
  }catch(e){sc.innerHTML=errBox(e.message,'insiderData=[];loadInsider()');}
}

function renderInsider(){
  const sc=document.getElementById('insider-scroll');
  let data=insiderData;
  if(insiderFilter==='köp')data=data.map(p=>({...p,trades:p.trades.filter(t=>t.type==='köp')})).filter(p=>p.trades.length);
  if(insiderFilter==='sälj')data=data.map(p=>({...p,trades:p.trades.filter(t=>t.type==='sälj')})).filter(p=>p.trades.length);
  if(insiderFilter==='senat')data=data.filter(p=>p.chamber==='Senate');
  if(insiderFilter==='repr')data=data.filter(p=>p.chamber==='House');
  if(!data.length){sc.innerHTML='<div class="empty">Inga affärer för detta filter.</div>';return;}
  let html='';
  data.forEach((p,i)=>{
    const av=AV[i%AV.length];
    const ini=p.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const pc=p.party==='R'?'#C0392B':p.party==='D'?'#2471A3':'var(--muted)';
    const rows=p.trades.slice(0,5).map((t,j,arr)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:${j<arr.length-1?'0.5px solid var(--border)':'none'}">
        <div><span style="font-size:13px;font-weight:500">${t.ticker}</span><span class="pill ${t.type==='köp'?'pill-buy':'pill-sell'}">${t.type==='köp'?'Köp':'Sälj'}</span></div>
        <div style="text-align:right"><div style="font-size:12px;font-weight:500;color:${t.type==='köp'?'var(--green)':'var(--red)'}">${t.amount||'–'}</div><div style="font-size:11px;color:var(--muted)">${t.date}</div></div>
      </div>`).join('');
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div class="av" style="background:${av.bg};color:${av.c}">${ini}</div>
      <div><div style="font-size:13px;font-weight:500">${p.name}</div>
      <div style="font-size:11px;color:var(--muted)"><span style="color:${pc};font-weight:500">${p.party==='R'?'Rep':'Dem'}</span> · ${p.chamber==='Senate'?'Senaten':'Representanthuset'}</div></div>
    </div>${rows}</div>`;
  });
  sc.innerHTML=html;
}

document.getElementById('insider-filters').addEventListener('click',e=>{
  const ch=e.target.closest('.chip');if(!ch)return;
  document.querySelectorAll('#insider-filters .chip').forEach(c=>c.classList.remove('on'));
  ch.classList.add('on');insiderFilter=ch.dataset.icat;renderInsider();
  document.getElementById('insider-scroll').scrollTop=0;
});

loadNews();
loadSpikes();
loadInsider();
</script>
</body>
</html>
