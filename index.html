<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Akatier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-l:#E6F1FB;--blue-d:#0C447C;--green:#27500A;--green-l:#EAF3DE;--red:#791F1F;--red-l:#FCEBEB;--amber:#633806;--amber-l:#FAEEDA;--purple:#3C3489;--purple-l:#EEEDFE;--bg:#f5f5f7;--surface:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#666;--r:12px}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f12;--surface:#1c1c1f;--border:rgba(255,255,255,0.1);--text:#f0f0f0;--muted:#999}}
html,body{height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
a{color:inherit;text-decoration:none}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:768px){
  .desktop-logo{display:block!important}
  body{display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
  #app{max-width:1100px;width:100%;height:calc(100dvh - 40px);max-height:860px;border:1px solid var(--border);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;display:grid;grid-template-columns:240px 1fr;grid-template-rows:1fr}
  .tabbar{grid-column:1;grid-row:1;flex-direction:column;border-top:none;border-right:0.5px solid var(--border);padding:20px 0;gap:4px;justify-content:flex-start;background:var(--surface)}
  .tab{flex:none;flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 24px;font-size:14px;border-radius:0}
  .tab svg{width:20px;height:20px}
  .tab.active{background:var(--bg);border-right:2px solid var(--blue)}
  .desktop-pages{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
  .page{max-width:600px;margin:0 auto;width:100%}
  .page.active{display:flex;height:100%}
  .desktop-pages .page{flex:1;min-height:0}
}
.page{display:none;flex-direction:column;flex:1;overflow:hidden}.page.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tabbar{display:flex;background:var(--surface);border-top:0.5px solid var(--border);padding:8px 0 max(16px,env(safe-area-inset-bottom));flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;border:none;background:transparent;color:var(--muted);font-size:10px;transition:color .15s}
.tab.active{color:var(--blue)}.tab svg{width:22px;height:22px}
.sechead{padding:14px 16px 10px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0}
.sechead h2{font-size:19px;font-weight:500}.sechead p{font-size:11px;color:var(--muted);margin-top:2px}
.chips{display:flex;gap:6px;padding:9px 12px;overflow-x:auto;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tsep{padding:6px 14px;font-size:11px;font-weight:500;color:var(--muted);background:var(--bg);border-bottom:0.5px solid var(--border)}
.card{background:var(--surface);margin:7px 11px;border-radius:var(--r);border:0.5px solid var(--border);padding:13px}
.pill{font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:500}
.pill-buy{background:var(--green-l);color:var(--green)}.pill-sell{background:var(--red-l);color:var(--red)}
.spin-wrap{display:flex;justify-content:center;padding:3rem}
.spin{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{margin:1rem;padding:14px;background:var(--red-l);border-radius:var(--r);font-size:12px;color:var(--red);text-align:center;line-height:1.6}
.errbox button{margin-top:10px;padding:5px 14px;border-radius:20px;border:none;background:var(--red);color:#fff;font-size:12px}
.empty{text-align:center;padding:3rem 2rem;color:var(--muted);font-size:13px}
.bars{height:44px;display:flex;align-items:flex-end;gap:2px;margin:8px 0}
.bar-n{flex:1;border-radius:2px 2px 0 0;background:var(--border);min-height:3px}
.bar-s{flex:1;border-radius:2px 2px 0 0;background:#378ADD;min-height:3px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.search-wrap{padding:10px 11px 6px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;position:relative}
.search-input{width:100%;padding:10px 44px 10px 12px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.search-input:focus{border-color:var(--blue)}
.search-btn{position:absolute;right:19px;top:50%;transform:translateY(-50%);background:var(--blue);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="app">

  <div class="desktop-pages">
  <!-- NYHETER -->
  <div class="page active" id="pg-news">
    <div class="sechead"><h2>Marknadsnyheter</h2><p>Senaste 36 timmarna</p></div>
    <div class="search-wrap">
      <input class="search-input" id="news-q" type="text" placeholder="Sök företag, t.ex. Tesla, Ericsson…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="search-btn" onclick="doNewsSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="chips" id="news-chips">
      <button class="chip on" onclick="newsCat(this,'alla')">Alla</button>
      <button class="chip" onclick="newsCat(this,'teknik')">Teknik</button>
      <button class="chip" onclick="newsCat(this,'energi')">Energi</button>
      <button class="chip" onclick="newsCat(this,'pharma')">Pharma</button>
      <button class="chip" onclick="newsCat(this,'krypto')">Krypto</button>
      <button class="chip" onclick="newsCat(this,'makro')">Makro</button>
    </div>
    <div class="scroll" id="news-scroll"></div>
  </div>

  <!-- KURSHOPP -->
  <div class="page" id="pg-spikes">
    <div class="sechead"><h2>AI-Aktieanalys</h2><p>S&amp;P 500 · köpmöjligheter &amp; dippar</p></div>
    <div style="padding:10px 11px;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;display:flex;gap:6px">
      <button onclick="runAnalysis('dipp')" class="chip on" id="btn-dipp">📉 Dippar</button>
      <button onclick="runAnalysis('köp')" class="chip" id="btn-köp">🚀 Köplägen</button>
      <button onclick="runAnalysis('sektor')" class="chip" id="btn-sektor">📊 Sektorer</button>
      <button onclick="runAnalysis('risk')" class="chip" id="btn-risk">⚠️ Risk</button>
    </div>
    <div class="scroll" id="spike-scroll"></div>
  </div>

  <!-- INSIDER -->
  <div class="page" id="pg-insider">
    <div class="sechead"><h2>Insider-handel</h2><p>Senaste 30 dagarna · STOCK Act</p></div>
    <div class="chips" id="insider-chips">
      <button class="chip on" onclick="insiderFilter(this,'alla')">Alla</button>
      <button class="chip" onclick="insiderFilter(this,'köp')">Köp</button>
      <button class="chip" onclick="insiderFilter(this,'sälj')">Sälj</button>
      <button class="chip" onclick="insiderFilter(this,'senat')">Senaten</button>
      <button class="chip" onclick="insiderFilter(this,'repr')">Repr.</button>
    </div>
    <div class="scroll" id="insider-scroll"></div>
  </div>

  </div>
  <div class="tabbar">
    <div class="desktop-logo" style="display:none;padding:0 24px 16px;font-size:20px;font-weight:600;color:var(--blue)">Akatier</div>
    <button class="tab active" onclick="switchTab('news',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 10h16M4 14h10M4 18h10M14 14h6v4h-6z"/></svg>Nyheter
    </button>
    <button class="tab" onclick="switchTab('spikes',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 6-6 8-6 14a6 6 0 0 0 12 0c0-6-6-8-6-14z"/><path d="M12 12c0 3-2 4-2 7a2 2 0 0 0 4 0c0-3-2-4-2-7z"/></svg>Kurshopp
    </button>
    <button class="tab" onclick="switchTab('insider',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>Insider
    </button>
  </div>
</div>

<script>
const R2J='https://api.rss2json.com/v1/api.json?rss_url=';
const POS=/beat|surge|jump|rise|gain|rally|high|record|buy|upgrade|profit|growth|strong|bull|soar|boost/i;
const NEG=/miss|fall|drop|decline|down|low|sell|downgrade|loss|weak|bear|cut|warn|crash|slide|plunge/i;


function switchTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
}

function spin(){return'<div class="spin-wrap"><div class="spin"></div></div>';}
function err(msg,retry){return`<div class="errbox">${msg}<br><button onclick="${retry}">Försök igen</button></div>`;}
function sent(t){const p=POS.test(t),n=NEG.test(t);if(p&&!n)return{l:'Positiv',bg:'var(--green-l)',c:'var(--green)'};if(n&&!p)return{l:'Negativ',bg:'var(--red-l)',c:'var(--red)'};return{l:'Neutral',bg:'var(--bg)',c:'var(--muted)'};}
function ago(d){const h=Math.round((Date.now()-new Date(d))/3600000);if(h<1)return'Precis nu';if(h<24)return h+' tim sedan';return Math.floor(h/24)+' dag sedan';}
function fmtV(v){if(!v)return'–';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return''+v;}

// ── NYHETER ───────────────────────────────────────────────────────────────────
const CAT_FEEDS={
  alla:['AAPL,MSFT,NVDA,TSLA,META,AMZN','XOM,CVX','PFE,LLY,MRK','^GSPC,^DJI,JPM','BTC-USD,ETH-USD,COIN'],
  teknik:['AAPL,MSFT,NVDA,TSLA,META,AMZN,GOOGL,AMD,INTC'],
  energi:['XOM,CVX,BP,OXY,SLB'],
  pharma:['PFE,LLY,MRK,ABBV,JNJ,AZN'],
  krypto:['BTC-USD,ETH-USD,SOL-USD,COIN'],
  makro:['^GSPC,^DJI,^IXIC,JPM,BAC'],
};
const CAT_STYLE={teknik:{bg:'#E6F1FB',c:'#0C447C',l:'Teknik'},energi:{bg:'#EAF3DE',c:'#27500A',l:'Energi'},pharma:{bg:'#FBEAF0',c:'#72243E',l:'Pharma'},krypto:{bg:'#FAEEDA',c:'#633806',l:'Krypto'},makro:{bg:'#EEEDFE',c:'#3C3489',l:'Makro'}};
const CAT_KEYS={teknik:['nvidia','apple','microsoft','google','meta','amazon','tesla','chip','ai','tech','nasdaq','semiconductor'],energi:['oil','energy','opec','gas','crude','exxon','chevron','barrel'],pharma:['fda','pharma','drug','vaccine','biotech','pfizer','merck','lilly'],krypto:['bitcoin','crypto','ethereum','blockchain','solana','coinbase','btc','eth'],makro:['fed','inflation','gdp','rate','central bank','interest','recession','treasury','dow','s&p']};
function guesscat(t){const s=t.toLowerCase();for(const[cat,keys]of Object.entries(CAT_KEYS)){if(keys.some(k=>s.includes(k)))return cat;}return'makro';}

let allNews=[],newsCatActive='alla',newsMode='cat';

function newsCat(btn,cat){
  document.querySelectorAll('#news-chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  newsCatActive=cat;newsMode='cat';
  document.getElementById('news-q').value='';
  if(allNews.length){renderNewsCat();return;}
  loadNewsCat();
}

function doNewsSearch(){
  const v=document.getElementById('news-q').value.trim();
  if(!v)return;
  newsMode='search';
  document.querySelectorAll('#news-chips .chip').forEach(c=>c.classList.remove('on'));
  fetchNewsBySymbol(v);
}
document.getElementById('news-q').addEventListener('keydown',e=>{if(e.key==='Enter')doNewsSearch();});

async function loadNewsCat(){
  const sc=document.getElementById('news-scroll');
  sc.innerHTML=spin();
  try{
    const feeds=CAT_FEEDS.alla;
    const results=await Promise.allSettled(feeds.map(syms=>
      fetch(R2J+encodeURIComponent('https://feeds.finance.yahoo.com/rss/2.0/headline?s='+syms+'&region=US&lang=en-US')).then(r=>r.json())
    ));
    allNews=results.flatMap(r=>{
      if(r.status!=='fulfilled'||r.value.status!=='ok')return[];
      return(r.value.items||[]).map(i=>({
        title:i.title,link:i.link,source:i.author||'Yahoo Finance',
        cat:guesscat(i.title),
        hoursAgo:Math.round((Date.now()-new Date(i.pubDate))/3600000),
      })).filter(n=>n.hoursAgo>=0&&n.hoursAgo<=36&&n.title);
    });
    allNews.sort((a,b)=>a.hoursAgo-b.hoursAgo);
    renderNewsCat();
  }catch(e){sc.innerHTML=err(e.message,'loadNewsCat()');}
}

function renderNewsCat(){
  const sc=document.getElementById('news-scroll');
  const items=newsCatActive==='alla'?allNews:allNews.filter(n=>n.cat===newsCatActive);
  const groups=[{label:'Senaste 6 timmarna',min:0,max:6},{label:'6–18 timmar sedan',min:6,max:18},{label:'18–36 timmar sedan',min:18,max:36}];
  let html='';
  groups.forEach(g=>{
    const gi=items.filter(n=>n.hoursAgo>=g.min&&n.hoursAgo<g.max);
    if(!gi.length)return;
    html+=`<div class="tsep">${g.label}</div>`;
    gi.forEach(n=>{
      const cs=CAT_STYLE[n.cat]||CAT_STYLE.makro;
      const s=sent(n.title);
      html+=`<div class="card"><a href="${n.link}" target="_blank" rel="noopener">
        <span style="display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;margin-bottom:7px;background:${cs.bg};color:${cs.c}">${cs.l}</span>
        <p style="font-size:13px;font-weight:500;line-height:1.45;color:var(--text);margin-bottom:6px">${n.title}</p>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span style="font-weight:500">${n.source}</span><span>${n.hoursAgo} tim sedan</span>
        </div>
      </a></div>`;
    });
  });
  sc.innerHTML=html||'<div class="empty">Inga nyheter för detta filter.</div>';
}

async function fetchNewsBySymbol(sym){
  const sc=document.getElementById('news-scroll');
  sc.innerHTML=spin();
  try{
    const url='https://feeds.finance.yahoo.com/rss/2.0/headline?s='+encodeURIComponent(sym)+'&region=US&lang=en-US';
    const r=await fetch(R2J+encodeURIComponent(url));
    const d=await r.json();
    let items=d.status==='ok'?d.items||[]:[];
    if(!items.length){
      const g='https://news.google.com/rss/search?q='+encodeURIComponent(sym+' stock')+'&hl=en-US&gl=US&ceid=US:en';
      const r2=await fetch(R2J+encodeURIComponent(g));
      const d2=await r2.json();
      items=d2.status==='ok'?d2.items||[]:[];
    }
    if(!items.length){sc.innerHTML='<div class="empty">Inga nyheter hittades för "'+sym+'"</div>';return;}
    let html=`<div style="display:flex;justify-content:space-between;padding:8px 13px;font-size:11px;color:var(--muted)"><span>Nyheter om <b style="color:var(--text)">${sym}</b></span><span style="color:var(--blue)">${items.length} artiklar</span></div>`;
    items.forEach(i=>{
      const s=sent(i.title);
      html+=`<div class="card"><a href="${i.link}" target="_blank" rel="noopener">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px">
          <p style="font-size:13px;font-weight:500;line-height:1.45;color:var(--text);flex:1">${i.title}</p>
          <span style="flex-shrink:0;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:2px;background:${s.bg};color:${s.c}">${s.l}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span style="font-weight:500">${i.author||'Yahoo Finance'}</span><span>${ago(i.pubDate||'')}</span>
        </div>
      </a></div>`;
    });
    sc.innerHTML=html;
  }catch(e){sc.innerHTML=err(e.message,"fetchNewsBySymbol('"+sym+"')");}
}

// ── AI AKTIEANALYS ────────────────────────────────────────────────────────────
async function loadSpikes(){runAnalysis('dipp');}

async function runAnalysis(type){
  const sc=document.getElementById('spike-scroll');
  ['dipp','köp','sektor','risk'].forEach(t=>{
    const b=document.getElementById('btn-'+t);
    if(b)b.classList.toggle('on',t===type);
  });
  sc.innerHTML='<div class="spin-wrap" style="flex-direction:column;gap:12px"><div class="spin"></div><span style="font-size:12px;color:var(--muted)">Akatier analyserar S&P 500…</span></div>';
  try{
    const res=await fetch('/api/analyze?type='+encodeURIComponent(type));
    if(!res.ok) throw new Error('HTTP '+res.status);
    const parsed=await res.json();
    if(parsed.error) throw new Error(parsed.error);
    renderAnalysis(parsed,type);
  }catch(e){sc.innerHTML=err('Analys misslyckades: '+e.message,"runAnalysis('"+type+"')");}
}

function renderAnalysis(data,type){
  const sc=document.getElementById('spike-scroll');
  const typeLabel={dipp:'Dippar & Köpmöjligheter',köp:'Starkaste Köplägen',sektor:'Sektoranalys',risk:'Riskvarningar'}[type];
  let html=`<div style="margin:10px 11px;padding:12px;background:var(--surface);border-radius:var(--r);border:0.5px solid var(--border)">
    <div style="font-size:10px;font-weight:600;color:var(--blue);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">AI · ${typeLabel}</div>
    <p style="font-size:13px;color:var(--text);line-height:1.5">${data.summary||''}</p>
  </div>`;
  (data.stocks||[]).forEach(s=>{
    const isKöp=s.signal==='köp',isUndvik=s.signal==='undvik';
    const sigBg=isKöp?'var(--green-l)':isUndvik?'var(--red-l)':'var(--amber-l)';
    const sigC=isKöp?'var(--green)':isUndvik?'var(--red)':'var(--amber)';
    const sigL=isKöp?'↑ Köp':isUndvik?'↓ Undvik':'◉ Bevaka';
    const riskC=s.risk==='låg'?'var(--green)':s.risk==='hög'?'var(--red)':'var(--amber)';
    const chgC=(s.change||'').startsWith('-')?'var(--red)':'var(--green)';
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><span style="font-size:18px;font-weight:700">${s.ticker}</span><span style="font-size:11px;color:var(--muted);margin-left:6px">${s.name}</span></div>
        <span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:${sigBg};color:${sigC};white-space:nowrap">${sigL}</span>
      </div>
      <p style="font-size:13px;color:var(--text);line-height:1.5;margin-bottom:10px">${s.reason}</p>
      <div style="display:flex;gap:10px;font-size:11px">
        ${s.change?`<span style="color:${chgC};font-weight:600">${s.change}</span>`:''}
        <span style="color:var(--muted)">Risk: <span style="color:${riskC};font-weight:500">${s.risk||'–'}</span></span>
      </div>
    </div>`;
  });
  html+=`<div style="text-align:center;padding:12px;font-size:11px;color:var(--muted)">Akatier AI · Ej finansiell rådgivning</div>`;
  sc.innerHTML=html;
}

// ── INSIDER ───────────────────────────────────────────────────────────────────
let insiderRaw=[], insiderF='alla';
const AV=[{bg:'#E6F1FB',c:'#0C447C'},{bg:'#EEEDFE',c:'#3C3489'},{bg:'#FBEAF0',c:'#72243E'},{bg:'#E1F5EE',c:'#085041'},{bg:'#FAEEDA',c:'#633806'}];

function insiderFilter(btn,f){
  document.querySelectorAll('#insider-chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');insiderF=f;
  if(insiderRaw.length)renderInsider();else loadInsider();
}

async function loadInsider(){
  const sc=document.getElementById('insider-scroll');
  sc.innerHTML=spin();
  try{
    const cutoff=new Date(Date.now()-30*24*3600*1000);
    const[hR,sR]=await Promise.allSettled([
      fetch('https://house-stock-watcher-data.s3-us-east-2.amazonaws.com/data/all_transactions.json').then(r=>r.json()),
      fetch('https://senate-stock-watcher-data.s3-us-east-2.amazonaws.com/aggregate/all_transactions.json').then(r=>r.json())
    ]);
    const house=hR.status==='fulfilled'?hR.value:[];
    const senate=sR.status==='fulfilled'?sR.value:[];
    const all=[
      ...house.filter(t=>new Date(t.transaction_date||t.disclosure_date)>=cutoff).map(t=>({name:t.representative,chamber:'House',party:t.party||'?',ticker:t.ticker,type:t.type==='purchase'?'köp':'sälj',amount:t.amount,date:(t.transaction_date||'').slice(0,10)})),
      ...senate.filter(t=>new Date(t.transaction_date||t.disclosure_date)>=cutoff).map(t=>({name:t.senator,chamber:'Senate',party:t.party||'?',ticker:t.ticker,type:(t.type||'').toLowerCase().includes('purchase')?'köp':'sälj',amount:t.amount,date:(t.transaction_date||'').slice(0,10)}))
    ].filter(t=>t.name&&t.ticker&&t.ticker!=='--'&&t.ticker.length<8);
    const byP={};
    all.forEach(t=>{if(!byP[t.name])byP[t.name]={name:t.name,chamber:t.chamber,party:t.party,trades:[]};byP[t.name].trades.push({ticker:t.ticker,type:t.type,amount:t.amount,date:t.date});});
    insiderRaw=Object.values(byP).filter(p=>p.trades.length).slice(0,40);
    if(!insiderRaw.length)throw new Error('Inga transaktioner hittades');
    renderInsider();
  }catch(e){sc.innerHTML=err(e.message,'loadInsider()');}
}

function renderInsider(){
  const sc=document.getElementById('insider-scroll');
  let data=insiderRaw;
  if(insiderF==='köp')data=data.map(p=>({...p,trades:p.trades.filter(t=>t.type==='köp')})).filter(p=>p.trades.length);
  if(insiderF==='sälj')data=data.map(p=>({...p,trades:p.trades.filter(t=>t.type==='sälj')})).filter(p=>p.trades.length);
  if(insiderF==='senat')data=data.filter(p=>p.chamber==='Senate');
  if(insiderF==='repr')data=data.filter(p=>p.chamber==='House');
  if(!data.length){sc.innerHTML='<div class="empty">Inga affärer för detta filter.</div>';return;}
  let html='';
  data.forEach((p,i)=>{
    const av=AV[i%AV.length],ini=p.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(),pc=p.party==='R'?'#C0392B':p.party==='D'?'#2471A3':'var(--muted)';
    const rows=p.trades.slice(0,5).map((t,j,arr)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:${j<arr.length-1?'0.5px solid var(--border)':'none'}"><div><span style="font-size:13px;font-weight:500">${t.ticker}</span><span class="pill ${t.type==='köp'?'pill-buy':'pill-sell'}">${t.type==='köp'?'Köp':'Sälj'}</span></div><div style="text-align:right"><div style="font-size:12px;font-weight:500;color:${t.type==='köp'?'var(--green)':'var(--red)'}">${t.amount||'–'}</div><div style="font-size:11px;color:var(--muted)">${t.date}</div></div></div>`).join('');
    html+=`<div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="av" style="background:${av.bg};color:${av.c}">${ini}</div><div><div style="font-size:13px;font-weight:500">${p.name}</div><div style="font-size:11px;color:var(--muted)"><span style="color:${pc};font-weight:500">${p.party==='R'?'Rep':'Dem'}</span> · ${p.chamber==='Senate'?'Senaten':'Representanthuset'}</div></div></div>${rows}</div>`;
  });
  sc.innerHTML=html;
}

// Start
loadNewsCat();
loadSpikes();
loadInsider();
</script>
